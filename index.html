<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quinielas Liga MX</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:20px;
}

.logo{
width:120px;
margin-bottom:10px;
}

.container{
max-width:600px;
margin:auto;
background:#1e293b;
padding:20px;
border-radius:10px;
}

.info{
background:#334155;
padding:10px;
border-radius:6px;
margin-bottom:10px;
}

.partido{
background:#334155;
margin:8px 0;
padding:10px;
border-radius:6px;
}

.opciones{
display:flex;
justify-content:space-around;
}

button{
margin-top:10px;
padding:12px;
width:100%;
background:#22c55e;
border:none;
color:white;
font-size:16px;
border-radius:6px;
}

.resultados{
margin-top:20px;
background:#020617;
padding:10px;
border-radius:6px;
}

</style>
</head>

<body>

<img class="logo" src="https://upload.wikimedia.org/wikipedia/commons/9/92/Liga_MX_logo.svg">

<h1>Quinielas Liga MX</h1>

<div class="container">

<div class="info">
💰 Costo por quiniela: $20<br>
⏰ Cierre: Viernes 7:00 PM<br>
📞 Informes: 5551234567
</div>

<input type="text" id="nombre" placeholder="Tu nombre">

<div id="partidos"></div>

<div class="info">
Dobles: <span id="dobles">0</span><br>
Triples: <span id="triples">0</span><br>
Total a pagar: $<span id="total">20</span>
</div>

<button onclick="aleatorio()">🎲 Aleatorio</button>
<button onclick="limpiar()">🧹 Limpiar</button>
<button onclick="agregar()">➕ Agregar Quiniela</button>
<button onclick="enviar()">📲 Enviar por WhatsApp</button>

<div class="resultados">
<h3>Quinielas agregadas</h3>
<div id="lista"></div>
</div>

</div>

<script>

const partidosDiv=document.getElementById("partidos");

for(let i=1;i<=9;i++){

partidosDiv.innerHTML+=`

<div class="partido">

<strong>Partido ${i}</strong>

<div class="opciones">

<label><input type="checkbox" name="p${i}" onchange="calcular()"> L</label>

<label><input type="checkbox" name="p${i}" onchange="calcular()"> E</label>

<label><input type="checkbox" name="p${i}" onchange="calcular()"> V</label>

</div>

</div>

`;

}

function calcular(){

let dobles=0;
let triples=0;

for(let i=1;i<=9;i++){

let seleccion=document.querySelectorAll(`input[name=p${i}]:checked`).length;

if(seleccion==2)dobles++;

if(seleccion==3)triples++;

}

let total=20 + (dobles*5) + (triples*10);

document.getElementById("dobles").innerText=dobles;
document.getElementById("triples").innerText=triples;
document.getElementById("total").innerText=total;

}

function limpiar(){

document.querySelectorAll("input[type=checkbox]").forEach(c=>c.checked=false);

calcular();

}

function aleatorio(){

limpiar();

for(let i=1;i<=9;i++){

let r=Math.floor(Math.random()*3);

document.querySelectorAll(`input[name=p${i}]`)[r].checked=true;

}

calcular();

}

let quinielas=[];

function agregar(){

let jugada=[];

for(let i=1;i<=9;i++){

let picks=[];

document.querySelectorAll(`input[name=p${i}]:checked`).forEach(c=>{
picks.push(c.value);
});

jugada.push(picks.join(""));

}

quinielas.push(jugada);

document.getElementById("lista").innerHTML+=`
<div>Quiniela ${quinielas.length}: ${jugada.join(" | ")}</div>
`;

limpiar();

}

function enviar(){

let nombre=document.getElementById("nombre").value;

let mensaje="Quiniela Liga MX%0A";

quinielas.forEach((q,i)=>{

mensaje+="Quiniela "+(i+1)+": "+q.join(" | ")+"%0A";

});

let telefono="5215551234567";

let url="https://wa.me/"+telefono+"?text="+mensaje;

window.open(url,"_blank");

}

</script>

</body>
</html>
