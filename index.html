<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quinielas Liga MX</title>

<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:white;
  margin:0;
  text-align:center;
}

.header{
  background:#1e293b;
  padding:15px;
}

h1{
  margin:0;
  color:#38bdf8;
}

.container{
  padding:20px;
  max-width:600px;
  margin:auto;
}

input{
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:10px;
  border:none;
  background:#e5e7eb;
}

button{
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:10px;
  border:none;
  background:#38bdf8;
  font-weight:bold;
}

.partido{
  background:#1e293b;
  margin:10px 0;
  padding:10px;
  border-radius:12px;
}

.opciones button{
  width:30%;
  margin:2px;
}

.seleccionado{
  background:#22c55e !important;
}

.btn-whatsapp{
  background:#25D366;
  color:white;
}

.lista{
  background:#020617;
  margin-top:20px;
  padding:10px;
  border-radius:10px;
  text-align:left;
  font-size:14px;
}
</style>
</head>

<body>

<div class="header">
  <h1>Quinielas Liga MX</h1>
</div>

<div class="container">

<input type="text" value="Jornada 10" disabled>
<input type="text" value="$10 pesos por quiniela" disabled>
<input type="text" value="Cierre: Viernes 20:00" disabled>
<input type="text" value="+52 56 1079 1509" disabled>

<button onclick="abrirFacebook()">Grupo de Facebook</button>

<input type="text" id="total" placeholder="Total de quinielas" disabled>
<input type="text" id="nombre" placeholder="Nombre del participante">

<div id="partidos"></div>

<button onclick="agregarQuiniela()">Agregar Quiniela</button>
<button onclick="limpiar()">Limpiar</button>
<button onclick="aleatorio()">Llenado Aleatorio</button>

<button class="btn-whatsapp" onclick="enviarWhats()">Enviar por WhatsApp</button>

<div id="lista" class="lista"></div>

</div>

<script>
// FACEBOOK
function abrirFacebook(){
  window.open("https://www.facebook.com/share/g/18kcwQzkPk/?mibextid=wwXIfr", "_blank");
}

// CREAR PARTIDOS
const contenedor = document.getElementById("partidos");

for(let i=1;i<=9;i++){
  contenedor.innerHTML += `
    <div class="partido">
      <p>Partido ${i}</p>
      <div class="opciones">
        <button onclick="toggle(this)">L</button>
        <button onclick="toggle(this)">E</button>
        <button onclick="toggle(this)">V</button>
      </div>
    </div>
  `;
}

// PERMITE DOBLES Y TRIPLES
function toggle(btn){
  btn.classList.toggle("seleccionado");
}

// GENERAR COMBINACIONES
function generarCombinaciones(){
  let partidos = [];

  document.querySelectorAll(".opciones").forEach(op=>{
    let seleccionados = [...op.querySelectorAll(".seleccionado")].map(b=>b.innerText);
    if(seleccionados.length === 0) seleccionados = ["-"];
    partidos.push(seleccionados);
  });

  // producto cartesiano
  let resultado = [[]];

  partidos.forEach(opciones=>{
    let temp = [];
    resultado.forEach(r=>{
      opciones.forEach(o=>{
        temp.push([...r, o]);
      });
    });
    resultado = temp;
  });

  return resultado;
}

// AGREGAR QUINIELA
function agregarQuiniela(){
  let combinaciones = generarCombinaciones();
  let lista = document.getElementById("lista");

  lista.innerHTML = "";

  combinaciones.forEach((c,i)=>{
    lista.innerHTML += `#${i+1} → ${c.join(" - ")}<br>`;
  });

  document.getElementById("total").value = combinaciones.length + " quinielas";
}

// LIMPIAR
function limpiar(){
  location.reload();
}

// ALEATORIO
function aleatorio(){
  document.querySelectorAll(".opciones").forEach(op=>{
    let botones = op.querySelectorAll("button");
    let rand = Math.floor(Math.random()*3);
    botones[rand].classList.add("seleccionado");
  });
}

// WHATSAPP
function enviarWhats(){
  let texto = document.getElementById("lista").innerText;
  window.open(`https://wa.me/?text=${encodeURIComponent(texto)}`);
}
</script>

</body>
</html>
