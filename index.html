<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Quinielas México</title>

<link rel="stylesheet" href="style.css">
<script>
function calcularTotal() {
  let partidos = document.querySelectorAll(".partido");
  let combinaciones = 1;

  partidos.forEach(partido => {
    let seleccionadas = partido.querySelectorAll("input[type=checkbox]:checked").length;

    if (seleccionadas === 0) {
      seleccionadas = 1;
    }

    combinaciones = combinaciones * seleccionadas;
  });

  let precio = 10; // precio por combinación
  let total = combinaciones * precio;

  document.getElementById("total").innerText = "$" + total;
}

document.querySelectorAll("input[type=checkbox]").forEach(c => {
  c.addEventListener("change", calcularTotal);
});
</script>
</head>

<body>

<h1>QUINIELAS MÉXICO</h1>
<h2>
  <table>

<tr>
<th>Local</th>
<th>L</th>
<th>E</th>
<th>V</th>
<th>Visitante</th>
</tr>

<tr>
<td>Fluminense</td>
<td><input type="checkbox" value="L" data-partido="1"></td>
<td><input type="checkbox" value="E" data-partido="1"></td>
<td><input type="checkbox" value="V" data-partido="1"></td>
<td>Paranaense</td>
</tr>

<tr>
<td>Santos</td>
<td><input type="checkbox" value="L" data-partido="2"></td>
<td><input type="checkbox" value="E" data-partido="2"></td>
<td><input type="checkbox" value="V" data-partido="2"></td>
<td>Corinthians</td>
</tr>

<tr>
<td>Internacional</td>
<td><input type="checkbox" value="L" data-partido="3"></td>
<td><input type="checkbox" value="E" data-partido="3"></td>
<td><input type="checkbox" value="V" data-partido="3"></td>
<td>Bahia</td>
</tr>

</table>

<div class="info">

<p>💰 Precio de la quiniela: $10</p>
<p>⏰ Cierre: Sábado 11:50 PM</p>

<p>
<a href="https://facebook.com" target="_blank">
Ir a Facebook Quinielas México
</a>
</p>

</div>

<h3>Total: $<span id="total">0</span></h3>

<input type="text" id="nombre" placeholder="Nombre del participante">

<div>

<button onclick="agregar()">Agregar quiniela</button>

</div>

<button onclick="enviar()">Enviar por WhatsApp</button>

<script src="script.js"></script>

</body>
</html>
