<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="format-detection" content="telephone=no">
<title>Quiniela Liga MX</title>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:20px;
}

.logo{
width:120px;
margin-bottom:10px;
cursor:pointer;
background:white;
padding:6px;
border-radius:8px;
}

.container{
max-width:600px;
margin:auto;
background:#1e293b;
padding:20px;
border-radius:10px;
}

.info{
background:#334155;
padding:10px;
border-radius:6px;
margin-bottom:10px;
}

.partido{
background:#334155;
margin:8px 0;
padding:10px;
border-radius:6px;
}

.opciones{
display:flex;
justify-content:space-around;
}

button{
margin-top:10px;
padding:12px;
width:100%;
background:#22c55e;
border:none;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

.resultados{
margin-top:20px;
background:#020617;
padding:10px;
border-radius:6px;
}
</style>
</head>

<body>

<h1>Quiniela Liga MX</h1>

<input type="text" id="nombre" placeholder="Nombre del participante"
style="width:100%; padding:10px; margin-bottom:10px;">

<div id="partidos"></div>

<div class="info">
Dobles: <span id="dobles">0</span><br>
Triples: <span id="triples">0</span><br>
Total quiniela actual: $<span id="totalActual">10</span><br>
Total a pagar: $<span id="total">0</span>
</div>

<button onclick="aleatorio()">🎲 Aleatorio</button>
<button onclick="limpiar()">🧹 Limpiar</button>
<button onclick="agregar()">➕ Agregar Quiniela</button>
<button onclick="enviar()">📲 Enviar</button>

<div class="resultados">
<h3>Quinielas agregadas</h3>
<div id="lista"></div>
</div>

<script>

const BASE = 10;
let quinielas = [];
let totalGlobal = 0;

const partidosDiv = document.getElementById("partidos");

// CREAR PARTIDOS
for(let i=1;i<=9;i++){
  partidosDiv.innerHTML += `
  <div class="partido">
    <strong>Partido ${i}</strong>
    <div class="opciones">
      <label><input type="checkbox" value="L" name="p${i}" onchange="calcular()"> L</label>
      <label><input type="checkbox" value="E" name="p${i}" onchange="calcular()"> E</label>
      <label><input type="checkbox" value="V" name="p${i}" onchange="calcular()"> V</label>
    </div>
  </div>`;
}

// CALCULAR
function calcular(){
  let dobles = 0;
  let triples = 0;

  for(let i=1;i<=9;i++){
    let seleccion = document.querySelectorAll(`input[name="p${i}"]:checked`).length;
    if(seleccion == 2) dobles++;
    if(seleccion == 3) triples++;
  }

  let total = BASE * Math.pow(2,dobles) * Math.pow(3,triples);

  document.getElementById("dobles").innerText = dobles;
  document.getElementById("triples").innerText = triples;
  document.getElementById("totalActual").innerText = total;
}

// LIMPIAR
function limpiar(){
  document.querySelectorAll('input[type="checkbox"]').forEach(c => c.checked = false);
  calcular();
}

// ALEATORIO
function aleatorio(){
  limpiar();
  for(let i=1;i<=9;i++){
    let opciones = document.querySelectorAll(`input[name="p${i}"]`);
    let r = Math.floor(Math.random()*3);
    opciones[r].checked = true;
  }
  calcular();
}

// AGREGAR QUINIELA
function agregar(){
  let nombre = document.getElementById("nombre").value.trim();

  if(nombre === ""){
    alert("Falta nombre");
    return;
  }

  let partidos = [];

  for(let i=1;i<=9;i++){
    let picks = [];

    document.querySelectorAll(`input[name="p${i}"]:checked`).forEach(c=>{
      picks.push(c.value);
    });

    if(picks.length === 0){
      alert("Faltan partidos");
      return;
    }

    partidos.push(picks);
  }

  function generar(arr, index=0){
    if(index === arr.length) return [[]];

    let res = [];
    let resto = generar(arr, index + 1);

    arr[index].forEach(op=>{
      resto.forEach(r=>{
        res.push([op, ...r]);
      });
    });

    return res;
  }

  let combos = generar(partidos);

  combos.forEach(c=>{
    quinielas.push(c);
    document.getElementById("lista").innerHTML += `
      <div>Quiniela ${quinielas.length}: ${c.join(" ")}</div>
    `;
  });

  totalGlobal += combos.length * BASE;

  document.getElementById("total").innerText = totalGlobal;

  limpiar();
}

// ENVIAR A SHEETS + WHATSAPP
function enviar(){

  let nombre = document.getElementById("nombre").value.trim();

  if(nombre === "" || quinielas.length === 0){
    alert("Falta nombre o quinielas");
    return;
  }

  let datos = {
    nombre: nombre,
    quinielas: quinielas,
    total: totalGlobal,
    fecha: new Date().toLocaleString()
  };

  fetch("https://script.google.com/macros/s/AKfycby247acu-XIDtEqxW_FtM39OvV4oQzq1Rzucts4ozm8XmL1FsqInQ-i05TzDD42BP7FAw/exec", {
    method: "POST",
    body: JSON.stringify(datos)
  })
  .then(res => res.text())
  .then(res => {
    alert("Respuesta real: " + res);
  })
  .catch(err => {
    alert("Error al enviar");
    console.log(err);
  });

  let mensaje = "*Quiniela Liga MX*%0A";
  mensaje += "Nombre: " + nombre + "%0A";
  mensaje += "Fecha: " + datos.fecha + "%0A%0A";

  quinielas.forEach((q,i)=>{
    mensaje += "Quiniela " + (i+1) + ": " + q.join(" ") + "%0A";
  });

  mensaje += "%0ATotal: $" + totalGlobal;

  window.open("https://wa.me/525610791509?text=" + mensaje, "_blank");

  quinielas = [];
  totalGlobal = 0;
  document.getElementById("lista").innerHTML = "";
  document.getElementById("total").innerText = "0";
}

</script>

</body>
</html>
