<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quiniela Liga MX</title>

<style>

body{
font-family: Arial;
background:#0f172a;
color:white;
text-align:center;
padding:20px;
}

h1{
color:#22c55e;
}

.container{
max-width:500px;
margin:auto;
background:#1e293b;
padding:20px;
border-radius:10px;
}

.info{
background:#334155;
padding:10px;
border-radius:6px;
margin-bottom:15px;
}

.partido{
margin:10px 0;
padding:10px;
background:#334155;
border-radius:6px;
}

select,input{
width:100%;
padding:10px;
margin-top:5px;
border-radius:5px;
border:none;
}

button{
margin-top:10px;
padding:12px;
width:100%;
background:#22c55e;
color:white;
border:none;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

.facebook{
margin-top:15px;
}

.facebook a{
color:#60a5fa;
text-decoration:none;
font-weight:bold;
}

</style>

</head>

<body>

<h1>⚽ Quiniela Liga MX</h1>

<div class="container">

<div class="info">
💰 Precio por quiniela: $20<br>
📅 Cierre: Viernes antes del primer partido
</div>

<form id="quinielaForm">

<input type="text" id="nombre" placeholder="Tu nombre" required>

<div class="partido">Partido 1
<select id="p1">
<option value="L">Local</option>
<option value="E">Empate</option>
<option value="V">Visitante</option>
</select>
</div>

<div class="partido">Partido 2
<select id="p2">
<option value="L">Local</option>
<option value="E">Empate</option>
<option value="V">Visitante</option>
</select>
</div>

<div class="partido">Partido 3
<select id="p3">
<option value="L">Local</option>
<option value="E">Empate</option>
<option value="V">Visitante</option>
</select>
</div>

<div class="partido">Partido 4
<select id="p4">
<option value="L">Local</option>
<option value="E">Empate</option>
<option value="V">Visitante</option>
</select>
</div>

<div class="partido">Partido 5
<select id="p5">
<option value="L">Local</option>
<option value="E">Empate</option>
<option value="V">Visitante</option>
</select>
</div>

<div class="partido">Partido 6
<select id="p6">
<option value="L">Local</option>
<option value="E">Empate</option>
<option value="V">Visitante</option>
</select>
</div>

<div class="partido">Partido 7
<select id="p7">
<option value="L">Local</option>
<option value="E">Empate</option>
<option value="V">Visitante</option>
</select>
</div>

<div class="partido">Partido 8
<select id="p8">
<option value="L">Local</option>
<option value="E">Empate</option>
<option value="V">Visitante</option>
</select>
</div>

<div class="partido">Partido 9
<select id="p9">
<option value="L">Local</option>
<option value="E">Empate</option>
<option value="V">Visitante</option>
</select>
</div>

<button type="button" onclick="aleatorio()">🎲 Aleatorio</button>

<button type="button" onclick="limpiar()">🧹 Limpiar</button>

<button type="submit">📨 Enviar Quiniela</button>

</form>

<div class="facebook">
<a href="https://www.facebook.com/share/g/16yT4cb2ZC/?mibextid=wwXIfr" target="_blank">
Ir al grupo de Facebook
</a>
</div>

</div>

<script>

const scriptURL="https://script.google.com/macros/s/AKfycbyi6aFWOTGxwt8y3lhjCa41ZdRQQmwD8OXxGS420uBBlRdk37Y2okA1nKnE5Z3noAM3/exec";

document.getElementById("quinielaForm").addEventListener("submit",function(e){

e.preventDefault();

let formData = new FormData();

formData.append("nombre",document.getElementById("nombre").value);

for(let i=1;i<=9;i++){
formData.append("p"+i,document.getElementById("p"+i).value);
}

fetch(scriptURL,{
method:"POST",
body:formData
})
.then(()=>{
alert("Quiniela enviada correctamente ⚽");
document.getElementById("quinielaForm").reset();
})
.catch(()=>{
alert("Error al enviar");
});

});

function limpiar(){

for(let i=1;i<=9;i++){
document.getElementById("p"+i).selectedIndex=0;
}

}

function aleatorio(){

let opciones=["L","E","V"];

for(let i=1;i<=9;i++){

let r=Math.floor(Math.random()*3);

document.getElementById("p"+i).value=opciones[r];

}

}

</script>

</body>
</html>
