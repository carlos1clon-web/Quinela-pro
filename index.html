<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Quiniela Liga MX</title>

  <style>
    body { font-family: Arial; background:#0f172a; color:white; text-align:center; }
    .box { max-width:600px; margin:auto; padding:20px; background:#1e293b; border-radius:10px; }
    input, button { padding:10px; margin:5px; width:90%; }
    .match { margin:10px 0; padding:10px; background:#334155; border-radius:8px; }
    label { margin-right:10px; }
  </style>
</head>

<body>

<div class="box">
  <h2>Quiniela Liga MX</h2>

  <input type="text" id="nombre" placeholder="Tu nombre">

  <div id="partidos"></div>

  <button onclick="enviar()">Enviar Quiniela</button>
</div>

<script>
const partidos = [
  "Partido 1",
  "Partido 2",
  "Partido 3",
  "Partido 4",
  "Partido 5"
];

const cont = document.getElementById("partidos");

partidos.forEach((p, i) => {
  cont.innerHTML += `
    <div class="match">
      <p>${p}</p>
      <label><input type="checkbox" name="p${i}" value="1"> 1</label>
      <label><input type="checkbox" name="p${i}" value="X"> X</label>
      <label><input type="checkbox" name="p${i}" value="2"> 2</label>
    </div>
  `;
});

function getPicks() {
  let picks = [];

  partidos.forEach((_, i) => {
    let opciones = [];
    document.querySelectorAll(`input[name="p${i}"]:checked`)
      .forEach(el => opciones.push(el.value));
    picks.push(opciones);
  });

  return picks;
}

function enviar() {
  const nombre = document.getElementById("nombre").value;
  const picks = getPicks();

  fetch("TU_WEB_APP_URL", {
    method: "POST",
    body: JSON.stringify({ nombre, picks })
  })
  .then(r => r.json())
  .then(res => {
    alert("Quiniela enviada ✔");
    console.log(res);
  })
  .catch(err => console.log(err));
}
</script>

</body>
</html>
