<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiniela Liga MX PRO</title>

<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:white;
  margin:0;
  padding:20px;
}

.container{
  max-width:600px;
  margin:auto;
  background:#1e293b;
  padding:20px;
  border-radius:12px;
}

h1{
  text-align:center;
  margin-bottom:20px;
}

input{
  width:100%;
  padding:10px;
  margin-bottom:15px;
  border-radius:8px;
  border:none;
}

.partido{
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
  gap:5px;
}

.partido button{
  flex:1;
  padding:10px;
  border:none;
  border-radius:6px;
  background:#334155;
  color:white;
  cursor:pointer;
}

.partido button.active{
  background:#22c55e;
}

.btn{
  width:100%;
  padding:12px;
  background:#2563eb;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
  margin-top:15px;
}

.btn:hover{
  background:#1d4ed8;
}

#status{
  text-align:center;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>🔥 Quiniela PRO</h1>

<input type="text" id="nombre" placeholder="Tu nombre">

<div id="partidos"></div>

<button class="btn" onclick="enviar()">Enviar Quiniela</button>

<div id="status"></div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbz4e1jm5JnKpFvCvRjI4Ss1UDi42TlqtaE2lBUOwQxpVHf_rnGyAdKBNzCxQX6X616mTw/exec"; 
// ⚠️ si cambia tu deploy, aquí se actualiza

const partidos = 9;
let selecciones = Array(partidos).fill("");

const contenedor = document.getElementById("partidos");

for(let i=0;i<partidos;i++){
  const div = document.createElement("div");
  div.className = "partido";

  div.innerHTML = `
    <button onclick="seleccionar(${i},'1',this)">1</button>
    <button onclick="seleccionar(${i},'X',this)">X</button>
    <button onclick="seleccionar(${i},'2',this)">2</button>
  `;

  contenedor.appendChild(div);
}

function seleccionar(index, valor, btn){
  selecciones[index] = valor;

  const botones = btn.parentElement.querySelectorAll("button");
  botones.forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
}

async function enviar(){

  const nombre = document.getElementById("nombre").value.trim();
  const status = document.getElementById("status");

  if(nombre.length < 2){
    status.innerText = "⚠️ Escribe tu nombre";
    return;
  }

  if(selecciones.includes("")){
    status.innerText = "⚠️ Completa todos los partidos";
    return;
  }

  const payload = {
    nombre: nombre,
    quinielas: [selecciones]
  };

  try {
    status.innerText = "Enviando...";

    const res = await fetch(API_URL, {
      method: "POST",
      body: JSON.stringify(payload)
    });

    const text = await res.text();

    if(text === "OK"){
      status.innerText = "✅ Quiniela enviada";
    } else {
      status.innerText = "❌ Error: " + text;
    }

  } catch(err){
    status.innerText = "❌ Error de conexión";
  }
}

</script>

</body>
</html>
