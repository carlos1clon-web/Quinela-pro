<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="format-detection" content="telephone=no">
<title>Quiniela Liga MX</title>

<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:white;
  text-align:center;
  padding:20px;
  margin:0;
}

.container{
  max-width:600px;
  margin:auto;
  background:#1e293b;
  padding:20px;
  border-radius:10px;
}

.partido,.info{
  background:#334155;
  padding:10px;
  margin:10px 0;
  border-radius:8px;
}

.opciones{
  display:flex;
  justify-content:space-around;
  margin-top:8px;
}

button{
  margin:5px;
  padding:10px 15px;
  border:none;
  border-radius:6px;
  background:#22c55e;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h1>Quiniela Liga MX</h1>

<input type="text" id="nombre" placeholder="Tu nombre">

<div id="partidos"></div>

<div class="info">
Dobles: <span id="dobles">0</span> |
Triples: <span id="triples">0</span><br>
Total: $<span id="total">0</span>
</div>

<button onclick="aleatorio()">🎲 Aleatorio</button>
<button onclick="limpiar()">🧹 Limpiar</button>
<button onclick="agregar()">➕ Agregar</button>
<button onclick="enviar()">📲 Enviar</button>

<div id="lista"></div>

</div>

<script>
const BASE = 10;
let quinielas = [];
let totalGlobal = 0;

const partidosDiv = document.getElementById("partidos");

for(let i=1;i<=9;i++){
  partidosDiv.innerHTML += `
  <div class="partido">
    <strong>Partido ${i}</strong>
    <div class="opciones">
      <label><input type="checkbox" name="p${i}" value="L" onchange="calcular()">L</label>
      <label><input type="checkbox" name="p${i}" value="E" onchange="calcular()">E</label>
      <label><input type="checkbox" name="p${i}" value="V" onchange="calcular()">V</label>
    </div>
  </div>`;
}

function calcular(){
  let dobles=0, triples=0;

  for(let i=1;i<=9;i++){
    const c=document.querySelectorAll(`input[name="p${i}"]:checked`).length;
    if(c===2) dobles++;
    if(c===3) triples++;
  }

  const costo = BASE * (2 ** dobles) * (3 ** triples);

  document.getElementById("dobles").textContent=dobles;
  document.getElementById("triples").textContent=triples;
  document.getElementById("total").textContent=costo;
}

function limpiar(){
  document.querySelectorAll("input[type=checkbox]").forEach(c=>c.checked=false);
  calcular();
}

function aleatorio(){
  limpiar();
  for(let i=1;i<=9;i++){
    const opts=document.querySelectorAll(`input[name="p${i}"]`);
    opts[Math.floor(Math.random()*3)].checked=true;
  }
  calcular();
}

function agregar(){
  const nombre=document.getElementById("nombre").value.trim();
  if(!nombre) return alert("Escribe tu nombre");

  let arr=[];

  for(let i=1;i<=9;i++){
    const picks=[...document.querySelectorAll(`input[name="p${i}"]:checked`)].map(c=>c.value);
    if(!picks.length) return alert("Falta Partido "+i);
    arr.push(picks);
  }

  function gen(a,i=0){
    if(i===a.length) return [[]];
    let res=[];
    let sub=gen(a,i+1);
    a[i].forEach(v=>sub.forEach(s=>res.push([v,...s])));
    return res;
  }

  const combos=gen(arr);

  combos.forEach(c=>{
    quinielas.push(c);
    document.getElementById("lista").innerHTML += `<div>${c.join(" - ")}</div>`;
  });

  totalGlobal += combos.length * BASE;
  document.getElementById("total").textContent=totalGlobal;

  limpiar();
}

function enviar(){
  const nombre=document.getElementById("nombre").value.trim();
  if(!nombre || quinielas.length===0) return alert("Falta info");

  const datos={
    nombre,
    quinielas,
    total: totalGlobal,
    fecha: new Date().toLocaleString("es-MX")
  };

  const url="https://script.google.com/macros/s/AKfycbz3amuSwCn6Oquu_BDXYE36AoLZDfneJtmPWPy8ex2sYym5IhMisNTM-CZQ9yy4jebw1Q/exec";

  fetch(url,{
    method:"POST",
    mode:"no-cors",
    body:JSON.stringify(datos)
  });

  let msg=`Quiniela Liga MX%0ANombre: ${nombre}%0A`;

  quinielas.forEach((q,i)=>{
    msg+=`Q${i+1}: ${q.join("-")}%0A`;
  });

  window.open("https://wa.me/525610791509?text="+msg,"_blank");

  quinielas=[];
  totalGlobal=0;
  document.getElementById("lista").innerHTML="";
  document.getElementById("total").textContent=0;
  limpiar();
}
</script>

</body>
</html>
