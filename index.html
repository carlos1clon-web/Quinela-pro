<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiniela Liga MX</title>

<style>
body{
  font-family:Arial;
  background:#0f172a;
  color:white;
  text-align:center;
  padding:20px;
}

.container{
  max-width:600px;
  margin:auto;
  background:#1e293b;
  padding:20px;
  border-radius:10px;
}

.partido{
  display:flex;
  justify-content:space-between;
  margin:10px 0;
  background:#334155;
  padding:10px;
  border-radius:8px;
}

button{
  background:#22c55e;
  border:none;
  padding:10px 20px;
  color:white;
  font-size:16px;
  border-radius:8px;
  margin-top:20px;
}
</style>
</head>

<body>

<div class="container">
<h2>Quiniela Liga MX</h2>

<input type="text" id="nombre" placeholder="Tu nombre" style="width:100%;padding:10px;margin-bottom:20px;">

<div id="partidos"></div>

<button onclick="enviar()">Enviar Quiniela</button>

<p id="status"></p>
</div>

<script>
const partidosLista = [
"América vs Chivas",
"Cruz Azul vs Pumas",
"Tigres vs Monterrey"
];

const contenedor = document.getElementById("partidos");

partidosLista.forEach((p, i) => {
  contenedor.innerHTML += `
    <div class="partido">
      <span>${p}</span>
      <div>
        <label><input type="radio" name="p${i}" value="L">L</label>
        <label><input type="radio" name="p${i}" value="E">E</label>
        <label><input type="radio" name="p${i}" value="V">V</label>
      </div>
    </div>
  `;
});

function enviar(){

  const nombre = document.getElementById("nombre").value;
  let picks = [];

  for(let i=0;i<partidosLista.length;i++){
    let seleccionado = document.querySelector(`input[name="p${i}"]:checked`);
    picks.push(seleccionado ? seleccionado.value : "");
  }

  const datos = {
    nombre: nombre,
    picks: picks.join(","),
    fecha: new Date().toLocaleString()
  };

  fetch("https://script.google.com/macros/s/AKfycbz3amuSwCn6Oquu_BDXYE36AoLZDfneJtmPWPy8ex2sYym5IhMisNTM-CZQ9yy4jebw1Q/exec", {
    method: "POST",
    body: JSON.stringify(datos)
  })
  .then(res => res.text())
  .then(res => {
    document.getElementById("status").innerText = "✅ Guardado correctamente";
  })
  .catch(err => {
    document.getElementById("status").innerText = "❌ Error al guardar";
  });

}
</script>

</body>
</html>
