<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quinielas Liga MX</title>

<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:white;
  margin:0;
  text-align:center;
}

.header{
  background:#1e293b;
  padding:15px;
}

h1{
  margin:0;
  color:#38bdf8;
}

.container{
  padding:20px;
  max-width:600px;
  margin:auto;
}

input{
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:10px;
  border:none;
  background:#e5e7eb;
}

button{
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:10px;
  border:none;
  background:#38bdf8;
  font-weight:bold;
}

.partido{
  background:#1e293b;
  margin:10px 0;
  padding:10px;
  border-radius:12px;
}

.opciones button{
  width:30%;
  margin:2px;
}

.seleccionado{
  background:#22c55e !important;
}

.btn-whatsapp{
  background:#25D366;
  color:white;
}

.lista{
  background:#020617;
  margin-top:20px;
  padding:10px;
  border-radius:10px;
  text-align:left;
  font-size:14px;
}
</style>
</head>

<body>

<div class="header">
  <h1>Quinielas Liga MX</h1>
</div>

<div class="container">

<input type="text" value="Jornada 10" disabled>
<input type="text" value="$10 pesos por quiniela" disabled>
<input type="text" value="Cierre: Viernes 20:00" disabled>

<input type="text" id="total" placeholder="Total de quinielas" disabled>
<input type="text" id="nombre" placeholder="Nombre del participante">

<div id="partidos"></div>

<button onclick="agregarQuiniela()">Generar Quiniela</button>
<button onclick="limpiar()">Limpiar</button>
<button onclick="aleatorio()">Aleatorio</button>

<button onclick="guardarSheets()">💾 Guardar en sistema</button>
<button class="btn-whatsapp" onclick="enviarWhats()">Enviar por WhatsApp</button>

<div id="lista" class="lista"></div>

</div>

<script>

const URL_SCRIPT = "https://script.google.com/macros/s/AKfycby7_VVCc6cpNJ5Yoy81PsfvCmMRVQw1UFumwfAJNiVx5vKt4Z47qKzKRRDmw8-05QLT/exec";

const contenedor = document.getElementById("partidos");

for(let i=1;i<=9;i++){
  contenedor.innerHTML += `
    <div class="partido">
      <p>Partido ${i}</p>
      <div class="opciones">
        <button onclick="toggle(this)">L</button>
        <button onclick="toggle(this)">E</button>
        <button onclick="toggle(this)">V</button>
      </div>
    </div>
  `;
}

function toggle(btn){
  btn.classList.toggle("seleccionado");
}

function generarCombinaciones(){
  let partidos = [];

  document.querySelectorAll(".opciones").forEach(op=>{
    let sel = [...op.querySelectorAll(".seleccionado")].map(b=>b.innerText);
    partidos.push(sel);
  });

  let resultado = [[]];

  partidos.forEach(opciones=>{
    let temp = [];
    resultado.forEach(r=>{
      opciones.forEach(o=>{
        temp.push([...r, o]);
      });
    });
    resultado = temp;
  });

  return resultado;
}

function agregarQuiniela(){
  let combinaciones = generarCombinaciones();
  let lista = document.getElementById("lista");

  if(combinaciones.length === 0){
    alert("Selecciona al menos una opción por partido");
    return;
  }

  lista.innerHTML = "";

  combinaciones.forEach((c,i)=>{
    lista.innerHTML += `#${i+1} → ${c.join(" - ")}<br>`;
  });

  document.getElementById("total").value = combinaciones.length;
}

function guardarSheets(){

  let nombre = document.getElementById("nombre").value.trim();
  let combinaciones = generarCombinaciones();

  if(nombre === ""){
    alert("Escribe tu nombre");
    return;
  }

  if(combinaciones.length === 0){
    alert("Genera una quiniela primero");
    return;
  }

  fetch(URL_SCRIPT, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      nombre: nombre,
      picks: combinaciones
    })
  })
  .then(res => res.text())
  .then(res => {
    alert("✅ Guardado en Sheets");
  })
  .catch(err => {
    alert("❌ Error al guardar");
    console.error(err);
  });
}

function enviarWhats(){

  let nombre = document.getElementById("nombre").value.trim();
  let lista = document.getElementById("lista").innerText;
  let total = document.getElementById("total").value;

  if(nombre === "" || lista === ""){
    alert("Completa la quiniela primero");
    return;
  }

  let pago = total * 10;

  let mensaje = `📊 Quiniela Liga MX\n\n👤 ${nombre}\n\n${lista}\n\nTotal: ${total}\nPago: $${pago}`;

  let numero = "525610791509";
  window.open(`https://wa.me/${numero}?text=${encodeURIComponent(mensaje)}`);
}

function limpiar(){
  location.reload();
}

function aleatorio(){
  document.querySelectorAll(".opciones").forEach(op=>{
    let botones = op.querySelectorAll("button");
    botones.forEach(b => b.classList.remove("seleccionado"));
    botones[Math.floor(Math.random()*3)].classList.add("seleccionado");
  });
}

</script>

</body>
</html>
