<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiniela Liga MX</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:20px;
}

.container{
max-width:650px;
margin:auto;
background:#1e293b;
padding:20px;
border-radius:10px;
}

.partido{
background:#334155;
padding:10px;
margin:8px 0;
border-radius:6px;
}

.opciones{
display:flex;
justify-content:space-around;
}

button{
margin-top:10px;
padding:12px;
width:100%;
background:#22c55e;
border:none;
color:white;
font-size:16px;
border-radius:6px;
}

.agregar{
background:#3b82f6;
}

.info{
background:#334155;
padding:10px;
border-radius:6px;
margin-bottom:10px;
}

.contador{
margin-top:15px;
background:#020617;
padding:10px;
border-radius:6px;
}

</style>
</head>

<body>

<h1>⚽ Quiniela Liga MX</h1>

<div class="container">

<div class="info">
💰 Precio base: $20<br>
📞 Informes: 5551234567
</div>

<input type="text" id="nombre" placeholder="Tu nombre">

<button class="agregar" onclick="agregarQuiniela()">➕ Agregar Quiniela</button>

<div id="quinielas"></div>

<div class="contador">
Dobles: <span id="dobles">0</span><br>
Triples: <span id="triples">0</span><br>
Costo total: $<span id="total">20</span>
</div>

<button onclick="aleatorio()">🎲 Aleatorio</button>
<button onclick="limpiar()">🧹 Limpiar</button>
<button onclick="enviar()">📨 Enviar Quiniela</button>

</div>

<script>

let totalQuinielas=0;

function crearPartidos(id){

let html="";

for(let i=1;i<=9;i++){

html+=`
<div class="partido">
<strong>Partido ${i}</strong>

<div class="opciones">

<label><input type="checkbox" name="q${id}p${i}" onchange="calcular()"> L</label>

<label><input type="checkbox" name="q${id}p${i}" onchange="calcular()"> E</label>

<label><input type="checkbox" name="q${id}p${i}" onchange="calcular()"> V</label>

</div>

</div>
`;

}

return html;

}

function agregarQuiniela(){

totalQuinielas++;

let div=document.createElement("div");

div.innerHTML="<h3>Quiniela "+totalQuinielas+"</h3>"+crearPartidos(totalQuinielas);

document.getElementById("quinielas").appendChild(div);

}

function calcular(){

let dobles=0;
let triples=0;

document.querySelectorAll(".partido").forEach(p=>{

let seleccionados=p.querySelectorAll("input:checked").length;

if(seleccionados==2) dobles++;

if(seleccionados==3) triples++;

});

let costo=20 + (dobles*5) + (triples*10);

document.getElementById("dobles").innerText=dobles;
document.getElementById("triples").innerText=triples;
document.getElementById("total").innerText=costo;

}

function limpiar(){

document.querySelectorAll("input[type=checkbox]").forEach(c=>c.checked=false);

calcular();

}

function aleatorio(){

limpiar();

document.querySelectorAll(".partido").forEach(p=>{

let opciones=p.querySelectorAll("input");

let r=Math.floor(Math.random()*3);

opciones[r].checked=true;

});

calcular();

}

const scriptURL="https://script.google.com/macros/s/AKfycbyi6aFWOTGxwt8y3lhjCa41ZdRQQmwD8OXxGS420uBBlRdk37Y2okA1nKnE5Z3noAM3/exec";

function enviar(){

let nombre=document.getElementById("nombre").value;

document.querySelectorAll("#quinielas > div").forEach((q,index)=>{

let formData=new FormData();

formData.append("nombre",nombre+" #"+(index+1));

for(let i=1;i<=9;i++){

let valores=[];

q.querySelectorAll(`input[name=q${index+1}p${i}]:checked`).forEach(c=>{
valores.push(c.parentElement.innerText.trim());
});

formData.append("p"+i,valores.join("-"));

}

fetch(scriptURL,{
method:"POST",
body:formData
});

});

alert("Quinielas enviadas ⚽");

}

agregarQuiniela();

</script>

</body>
</html>
