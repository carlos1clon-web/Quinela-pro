<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quinielas Liga MX</title>

<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:white;
  margin:0;
  text-align:center;
}

.header{
  background:#1e293b;
  padding:15px;
}

h1{
  margin:0;
  color:#38bdf8;
}

.container{
  padding:20px;
  max-width:600px;
  margin:auto;
}

input{
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:10px;
  border:none;
  background:#e5e7eb;
}

button{
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:10px;
  border:none;
  background:#38bdf8;
  font-weight:bold;
}

.partido{
  background:#1e293b;
  margin:10px 0;
  padding:10px;
  border-radius:12px;
}

.opciones button{
  width:30%;
  margin:2px;
}

.seleccionado{
  background:#22c55e !important;
}

.btn-whatsapp{
  background:#25D366;
  color:white;
}

.lista{
  background:#020617;
  margin-top:20px;
  padding:10px;
  border-radius:10px;
  text-align:left;
  font-size:14px;
}
</style>
</head>

<body>

<div class="header">
  <h1>Quinielas Liga MX</h1>
</div>

<div class="container">

<input type="text" value="Jornada 10" disabled>
<input type="text" value="$10 pesos por quiniela" disabled>
<input type="text" value="Cierre: Viernes 20:00" disabled>
<input type="text" value="Informes al +52 55 7224 6040" disabled>

<button onclick="abrirFacebook()">Grupo de Facebook</button>

<input type="text" id="total" placeholder="Total de quinielas" disabled>
<input type="text" id="nombre" placeholder="Nombre del participante">

<div id="partidos"></div>

<button onclick="agregarQuiniela()">Agregar Quiniela</button>
<button onclick="limpiar()">Limpiar</button>
<button onclick="aleatorio()">Llenado Aleatorio</button>
<button onclick="enviarASheets()">Guardar Quiniela</button>

<button class="btn-whatsapp" onclick="enviarWhats()">Enviar por WhatsApp</button>

<div id="lista" class="lista"></div>

</div>

<script>

// FACEBOOK
function abrirFacebook(){
  window.open("https://www.facebook.com/share/g/18kcwQzkPk/?mibextid=wwXIfr", "_blank");
}

// CREAR PARTIDOS
const contenedor = document.getElementById("partidos");

for(let i=1;i<=9;i++){
  contenedor.innerHTML += `
    <div class="partido">
      <p>Partido ${i}</p>
      <div class="opciones">
        <button onclick="toggle(this)">L</button>
        <button onclick="toggle(this)">E</button>
        <button onclick="toggle(this)">V</button>
      </div>
    </div>
  `;
}

// TOGGLE
function toggle(btn){
  btn.classList.toggle("seleccionado");
}

// VALIDAR
function quinielaCompleta(){
  let completa = true;

  document.querySelectorAll(".opciones").forEach(op=>{
    if(op.querySelectorAll(".seleccionado").length === 0){
      completa = false;
    }
  });

  return completa;
}

// GENERAR COMBINACIONES
function generarCombinaciones(){
  let partidos = [];

  document.querySelectorAll(".opciones").forEach(op=>{
    let seleccionados = [...op.querySelectorAll(".seleccionado")].map(b=>b.innerText);
    partidos.push(seleccionados);
  });

  let resultado = [[]];

  partidos.forEach(opciones=>{
    let temp = [];
    resultado.forEach(r=>{
      opciones.forEach(o=>{
        temp.push([...r, o]);
      });
    });
    resultado = temp;
  });

  return resultado;
}

// AGREGAR QUINIELA
function agregarQuiniela(){

  let nombre = document.getElementById("nombre").value.trim();

  if(nombre === ""){
    alert("Debes ingresar el nombre");
    return;
  }

  if(!quinielaCompleta()){
    alert("Debes seleccionar todos los partidos");
    return;
  }

  let combinaciones = generarCombinaciones();
  let lista = document.getElementById("lista");

  lista.innerHTML = "";

  combinaciones.forEach((c,i)=>{
    lista.innerHTML += `#${i+1} → ${c.join(" - ")}<br>`;
  });

  document.getElementById("total").value = combinaciones.length + " quinielas";
}

// LIMPIAR
function limpiar(){
  location.reload();
}

// ALEATORIO (CORREGIDO)
function aleatorio(){
  document.querySelectorAll(".opciones").forEach(op=>{
    let botones = op.querySelectorAll("button");

    botones.forEach(b => b.classList.remove("seleccionado"));

    let rand = Math.floor(Math.random()*3);
    botones[rand].classList.add("seleccionado");
  });
}

// ENVIAR A SHEETS
function enviarASheets(){

  let nombre = document.getElementById("nombre").value.trim();

  if(nombre === ""){
    alert("Debes ingresar el nombre");
    return;
  }

  if(!quinielaCompleta()){
    alert("Debes completar todos los partidos");
    return;
  }

  let combinaciones = generarCombinaciones();

  let data = {
    nombre: nombre,
    quinielas: combinaciones
  };

  fetch("https://script.google.com/macros/s/AKfycbz3amuSwCn6Oquu_BDXYE36AoLZDfneJtmPWPy8ex2sYym5IhMisNTM-CZQ9yy4jebw1Q/exec", {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(res => res.json())
  .then(res => {
    alert("✅ Guardado en Google Sheets");
  })
  .catch(err => {
    alert("❌ Error al guardar");
    console.error(err);
  });
}

// WHATSAPP
function enviarWhats(){
  let nombre = document.getElementById("nombre").value.trim();
  let lista = document.getElementById("lista").innerText;
  let total = document.getElementById("total").value;

  if(nombre === ""){
    alert("Debes ingresar el nombre");
    return;
  }

  if(lista === ""){
    alert("Primero agrega la quiniela");
    return;
  }

  let cantidad = parseInt(total);
  let pago = cantidad * 10;

  let mensaje = `📊 Quiniela Liga MX\n\n`;
  mensaje += `👤 ${nombre}\n\n`;
  mensaje += `${lista}\n\n`;
  mensaje += `📊 Total: ${cantidad}\n`;
  mensaje += `💰 $${pago} MXN`;

  let numero = "525610791509";

  window.open(`https://wa.me/${numero}?text=${encodeURIComponent(mensaje)}`);
}

</script>

</body>
</html>
