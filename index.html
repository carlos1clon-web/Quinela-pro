<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quinielas Liga MX</title>
<style>
  body{ font-family: Arial; background:#0f172a; color:white; margin:0; text-align:center; }
  .header{ background:#1e293b; padding:15px; }
  h1{ margin:0; color:#38bdf8; }
  .container{ padding:20px; max-width:600px; margin:auto; }
  input{ width:100%; padding:12px; margin:6px 0; border-radius:10px; border:none; background:#e5e7eb; color:#333; }
  button{ width:100%; padding:12px; margin:6px 0; border-radius:10px; border:none; background:#38bdf8; font-weight:bold; cursor:pointer; }
  .partido{ background:#1e293b; margin:10px 0; padding:10px; border-radius:12px; }
  .opciones button{ width:30%; margin:2px; background:#475569; color:white; border:none; padding:10px; border-radius:5px; }
  .seleccionado{ background:#22c55e !important; }
  .btn-whatsapp{ background:#25D366; color:white; margin-top:20px; }
  .lista{ background:#020617; margin-top:20px; padding:10px; border-radius:10px; text-align:left; font-size:14px; min-height:20px; border:1px solid #334155; }
</style>
</head>
<body>

<div class="header">
  <h1>Quinielas Liga MX</h1>
</div>

<div class="container">
  <input type="text" value="Jornada 10" disabled>
  <input type="text" value="$10 pesos por quiniela" disabled>
  <button onclick="abrirFacebook()">Grupo de Facebook</button>

  <input type="text" id="nombre" placeholder="Nombre del participante">
  
  <div id="partidos"></div>

  <button onclick="agregarQuiniela()">1. Registrar Combinaciones</button>
  <button onclick="aleatorio()">Llenado Aleatorio</button>
  <button onclick="limpiar()" style="background:#ef4444;">Limpiar</button>

  <div id="lista" class="lista"></div>
  <input type="text" id="total" placeholder="Total de quinielas" disabled style="background:transparent; color:#38bdf8; text-align:center; font-weight:bold;">

  <button class="btn-whatsapp" onclick="enviarWhats()">2. Enviar por WhatsApp</button>
</div>

<script>
// URL de tu Script de Google (ID actualizado según tu código)
const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbxZ4e1jm5JnKpFvCvRjI4Ss1UDi42TlqtaE2lBUOwQxpVHf_rnGyAdKBNzCxQX6X616mTw/exec";

function abrirFacebook(){
  window.open("https://www.facebook.com/share/g/18kcwQzkPk/?mibextid=wwXIfr", "_blank");
}

const contenedor = document.getElementById("partidos");
for(let i=1; i<=9; i++){
  contenedor.innerHTML += `
    <div class="partido">
      <p style="margin-top:0">Partido ${i}</p>
      <div class="opciones">
        <button onclick="toggle(this)">L</button>
        <button onclick="toggle(this)">E</button>
        <button onclick="toggle(this)">V</button>
      </div>
    </div>`;
}

function toggle(btn){
  btn.classList.toggle("seleccionado");
}

function generarCombinaciones(){
  let partidos = [];
  document.querySelectorAll(".opciones").forEach(op=>{
    let sel = [...op.querySelectorAll(".seleccionado")].map(b=>b.innerText);
    partidos.push(sel);
  });
  let resultado = [[]];
  partidos.forEach(opciones=>{
    let temp = [];
    resultado.forEach(r=>{
      opciones.forEach(o=>{ temp.push([...r, o]); });
    });
    resultado = temp;
  });
  return resultado;
}

function agregarQuiniela(){
  let combinaciones = generarCombinaciones();
  if(combinaciones[0].length < 9){ alert("Selecciona al menos una opción por partido"); return; }
  
  let lista = document.getElementById("lista");
  lista.innerHTML = "<b>Combinaciones listas:</b><br>";
  combinaciones.forEach((c,i)=>{
    lista.innerHTML += `#${i+1} → ${c.join(" - ")}<br>`;
  });
  document.getElementById("total").value = "Total: " + combinaciones.length + " quinielas";
}

function limpiar(){ location.reload(); }

function aleatorio(){
  document.querySelectorAll(".opciones").forEach(op=>{
    let botones = op.querySelectorAll("button");
    botones.forEach(b => b.classList.remove("seleccionado"));
    botones[Math.floor(Math.random()*3)].classList.add("seleccionado");
  });
}

async function enviarWhats(){
  let nombre = document.getElementById("nombre").value.trim();
  let combinaciones = generarCombinaciones();
  let total = combinaciones.length;

  if(nombre === "" || combinaciones[0].length < 9){
    alert("Ingresa tu nombre y completa la quiniela");
    return;
  }

  // ENVIAR A GOOGLE SHEETS (Uno por uno para que el script calcule los puntos)
  for(let quiniela of combinaciones){
    fetch(URL_SCRIPT, {
      method: "POST",
      mode: "no-cors",
      body: JSON.stringify({
        nombre: nombre,
        quiniela: quiniela
      })
    });
  }

  // PREPARAR MENSAJE WHATSAPP
  let listaTexto = "";
  combinaciones.forEach((c, i) => {
    listaTexto += `*#${i+1}* → ${c.join(" - ")}\n`;
  });

  let mensaje = `📊 *QUINIELA LIGA MX*\n\n👤 *Participante:* ${nombre}\n\n📋 *Selecciones:*\n${listaTexto}\n💰 *Total:* $${total * 10} MXN`;
  
  let numero = "525610791509";
  window.open(`https://wa.me/${numero}?text=${encodeURIComponent(mensaje)}`);
}
</script>
</body>
</html>
