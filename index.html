<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiniela Liga MX - Jornada 15</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      margin: 0;
      padding: 15px;
    }
    .container {
      max-width: 620px;
      margin: auto;
      background: #1e2937;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    header {
      background: linear-gradient(135deg, #1e40af, #3b82f6);
      padding: 20px;
      text-align: center;
      color: white;
    }
    h1 { margin: 0; font-size: 1.8em; }
    .subtitle { font-size: 1.1em; opacity: 0.9; }

    .info {
      padding: 15px;
      background: #334155;
      text-align: center;
      font-size: 1.1em;
    }
    .partido {
      background: #1e2937;
      margin: 10px 15px;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #475569;
    }
    .partido strong {
      display: block;
      margin-bottom: 8px;
      color: #60a5fa;
    }
    .opciones {
      display: flex;
      justify-content: space-around;
      gap: 10px;
    }
    label {
      flex: 1;
      text-align: center;
      background: #334155;
      padding: 12px 8px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }
    label:hover { background: #475569; }
    input[type="checkbox"] { display: none; }
    input[type="checkbox"]:checked + span {
      background: #22c55e;
      color: white;
      font-weight: bold;
    }
    span {
      display: block;
      padding: 8px;
      border-radius: 6px;
    }

    .controls {
      padding: 15px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }
    button {
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      font-size: 1em;
      cursor: pointer;
      flex: 1;
      min-width: 120px;
    }
    .btn-primary { background: #22c55e; color: white; }
    .btn-secondary { background: #64748b; color: white; }
    .btn-danger { background: #ef4444; color: white; }

    .lista {
      padding: 15px;
      max-height: 300px;
      overflow-y: auto;
      background: #0f172a;
    }
    .lista div {
      background: #1e2937;
      margin: 6px 0;
      padding: 10px;
      border-radius: 8px;
      font-size: 0.95em;
    }

    input#nombre {
      width: 90%;
      margin: 15px auto;
      display: block;
      padding: 14px;
      border-radius: 10px;
      border: none;
      background: #334155;
      color: white;
      font-size: 1.1em;
    }
  </style>
</head>
<body>
<div class="container">
  <header>
    <h1>⚽ Quiniela Liga MX</h1>
    <p class="subtitle">Jornada 15 - Clausura 2026<br>Bolsa Total: <strong>$45,000</strong></p>
  </header>

  <input type="text" id="nombre" placeholder="Tu nombre completo">

  <div id="partidos"></div>

  <div class="info">
    Dobles: <strong id="dobles">0</strong> | 
    Triples: <strong id="triples">0</strong><br>
    Costo total: <strong>$<span id="total">0</span></strong>
  </div>

  <div class="controls">
    <button onclick="aleatorio()" class="btn-secondary">🎲 Aleatorio</button>
    <button onclick="limpiar()" class="btn-danger">🧹 Limpiar</button>
    <button onclick="agregar()" class="btn-primary">➕ Agregar Quiniela</button>
    <button onclick="enviar()" class="btn-primary">📲 Enviar por WhatsApp</button>
  </div>

  <div id="lista" class="lista"></div>
</div>

<script>
const BASE = 10;
let quinielas = [];
let totalGlobal = 0;

const partidos = [
  "Atl. San Luis vs Pumas",
  "Mazatlán vs Querétaro",
  "Necaxa vs Tigres",
  "Cruz Azul vs Tijuana",
  "Chivas vs Puebla",
  "Monterrey vs Pachuca",
  "León vs Atlas",
  "Santos vs América",
  "Toluca vs Juárez",
  "Puebla vs otro"  // Ajusta el último si tienes el fixture exacto
];

const partidosDiv = document.getElementById("partidos");

partidos.forEach((partido, i) => {
  partidosDiv.innerHTML += `
    <div class="partido">
      <strong>Partido ${i+1}: ${partido}</strong>
      <div class="opciones">
        <label><input type="checkbox" value="L" name="p${i}" onchange="calcular()"> <span>L</span></label>
        <label><input type="checkbox" value="E" name="p${i}" onchange="calcular()"> <span>E</span></label>
        <label><input type="checkbox" value="V" name="p${i}" onchange="calcular()"> <span>V</span></label>
      </div>
    </div>`;
});

function calcular() {
  let dobles = 0, triples = 0;
  for (let i = 0; i < partidos.length; i++) {
    const checked = document.querySelectorAll(`input[name="p${i}"]:checked`).length;
    if (checked === 2) dobles++;
    if (checked === 3) triples++;
  }
  const costo = BASE * Math.pow(2, dobles) * Math.pow(3, triples);
  document.getElementById("dobles").textContent = dobles;
  document.getElementById("triples").textContent = triples;
  document.getElementById("total").textContent = costo;
}

function limpiar() {
  document.querySelectorAll("input[type=checkbox]").forEach(c => c.checked = false);
  calcular();
}

function aleatorio() {
  limpiar();
  for (let i = 0; i < partidos.length; i++) {
    const opts = document.querySelectorAll(`input[name="p${i}"]`);
    opts[Math.floor(Math.random() * 3)].checked = true;
  }
  calcular();
}

function agregar() {
  const nombre = document.getElementById("nombre").value.trim();
  if (!nombre) return alert("Por favor escribe tu nombre");

  let picks = [];
  for (let i = 0; i < partidos.length; i++) {
    const selected = [...document.querySelectorAll(`input[name="p${i}"]:checked`)].map(c => c.value);
    if (selected.length === 0) return alert(`Falta completar el Partido ${i+1}`);
    picks.push(selected);
  }

  // Generar todas las combinaciones
  function generarCombinaciones(arr, index = 0) {
    if (index === arr.length) return [[]];
    let res = [];
    let subs = generarCombinaciones(arr, index + 1);
    arr[index].forEach(v => {
      subs.forEach(s => res.push([v, ...s]));
    });
    return res;
  }

  const combos = generarCombinaciones(picks);

  combos.forEach(combo => {
    quinielas.push(combo);
    document.getElementById("lista").innerHTML += `<div>${combo.join(" - ")}</div>`;
  });

  totalGlobal += combos.length * BASE;
  document.getElementById("total").textContent = totalGlobal;

  limpiar();
}

function enviar() {
  const nombre = document.getElementById("nombre").value.trim();
  if (!nombre || quinielas.length === 0) return alert("Falta información");

  let msg = `Quiniela Liga MX - Jornada 15%0A`;
  msg += `Nombre: ${nombre}%0A`;
  msg += `Total quinielas: ${quinielas.length} ($${totalGlobal})%0A%0A`;

  quinielas.forEach((q, i) => {
    msg += `Q${i+1}: ${q.join(" - ")}%0A`;
  });

  window.open(`https://wa.me/525610791509?text=${msg}`, "_blank");

  // Reiniciar
  quinielas = [];
  totalGlobal = 0;
  document.getElementById("lista").innerHTML = "";
  document.getElementById("total").textContent = "0";
  limpiar();
}
</script>
</body>
</html>
