<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Quiniela</title>

<style>
body { font-family: Arial; text-align: center; }
button { margin: 5px; padding: 10px; }
.sel { background: green; color: white; }
</style>
</head>

<body>

<h2>Quiniela</h2>

<input id="nombre" placeholder="Tu nombre"><br><br>

<div id="partidos"></div>

<br>
<button onclick="enviar()">Enviar</button>

<script>
// 🔴 PEGA TU URL AQUI
const URL = "https://script.google.com/macros/s/AKfycbyO8DwrZNEqanr6V9zzAgQd83IlXhAONfeYrGgBQRweZrtKTsQqR5AggrjVQG2V6M43/exec";

// CREAR 9 PARTIDOS
const cont = document.getElementById("partidos");

for(let i=1;i<=9;i++){
  cont.innerHTML += `
    <div>
      Partido ${i}:
      <button onclick="sel(this)">L</button>
      <button onclick="sel(this)">E</button>
      <button onclick="sel(this)">V</button>
    </div>
  `;
}

// SELECCIONAR SOLO UNA OPCIÓN
function sel(btn){
  let parent = btn.parentElement;
  parent.querySelectorAll("button").forEach(b=>b.classList.remove("sel"));
  btn.classList.add("sel");
}

// ENVIAR
function enviar(){
  let nombre = document.getElementById("nombre").value;
  let picks = [];

  document.querySelectorAll("#partidos div").forEach(p=>{
    let sel = p.querySelector(".sel");
    if(!sel){
      alert("Falta seleccionar un partido");
      return;
    }
    picks.push(sel.innerText);
  });

  fetch(URL, {
    method: "POST",
    body: JSON.stringify({ nombre, picks }),
    headers: { "Content-Type": "application/json" }
  })
  .then(r=>r.text())
  .then(r=>{
    alert("Guardado!");
  })
  .catch(e=>{
    alert("Error");
  });
}
</script>

</body>
</html>
