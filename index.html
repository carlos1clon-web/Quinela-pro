<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quinielas Liga MX</title>

<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:white;
  margin:0;
  text-align:center;
}

.header{
  background:#1e293b;
  padding:15px;
}

h1{
  margin:0;
  color:#38bdf8;
}

.container{
  padding:20px;
  max-width:600px;
  margin:auto;
}

input{
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:10px;
  border:none;
  background:#e5e7eb;
}

button{
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:10px;
  border:none;
  background:#38bdf8;
  font-weight:bold;
}

.partido{
  background:#1e293b;
  margin:10px 0;
  padding:10px;
  border-radius:12px;
}

.opciones button{
  width:30%;
  margin:2px;
}

.seleccionado{
  background:#22c55e !important;
}

.btn-whatsapp{
  background:#25D366;
  color:white;
}

.lista{
  background:#020617;
  margin-top:20px;
  padding:10px;
  border-radius:10px;
  text-align:left;
  font-size:14px;
}
</style>
</head>

<body>

<div class="header">
  <h1>Quinielas Liga MX</h1>
</div>

<div class="container">

<input type="text" value="Jornada 10" disabled>
<input type="text" value="$10 pesos por quiniela" disabled>
<input type="text" value="Cierre: Viernes 20:00" disabled>
<input type="text" value="Informes al +52 55 7224 6040" disabled>

<button onclick="abrirFacebook()">Grupo de Facebook</button>

<input type="text" id="total" placeholder="Total de quinielas" disabled>
<input type="text" id="nombre" placeholder="Nombre del participante">

<div id="partidos"></div>

<button onclick="agregarQuiniela()">Agregar Quiniela</button>
<button onclick="limpiar()">Limpiar</button>
<button onclick="aleatorio()">Llenado Aleatorio</button>

<button class="btn-whatsapp" onclick="enviarWhats()">Enviar por WhatsApp</button>

<div id="lista" class="lista"></div>

</div>

<script>

const URL_SCRIPT = "/**
 * ============================================================
 * QUINIELA LIGA MX - BACKEND PROFESIONAL v11.0
 * Resuelve el error: "doGet no encontrada"
 * ============================================================
 */

const NOMBRE_HOJA_DATOS = "QUINIELAS";
const NOMBRE_HOJA_RES = "RESULTADOS";
const TOTAL_PARTIDOS = 9;

// ESTA FUNCIÓN ES LA QUE EVITA EL ERROR "doGet no encontrada"
function doGet(e) {
  return ContentService.createTextOutput("✅ El servidor de la Quiniela está ACTIVO y esperando datos.")
    .setMimeType(ContentService.MimeType.TEXT);
}

function doPost(e) {
  const ss = SpreadsheetApp.getActiveSpreadsheet();
  const sheet = ss.getSheetByName(NOMBRE_HOJA_DATOS) || ss.insertSheet(NOMBRE_HOJA_DATOS);
  const resSheet = ss.getSheetByName(NOMBRE_HOJA_RES);

  try {
    // 1. EXTRAER DATOS DEL HTML
    const data = JSON.parse(e.postData.contents);
    const nombre = data.nombre || "Sin Nombre";
    const combinaciones = data.quiniela; 

    if (!combinaciones || !Array.isArray(combinaciones)) {
      throw new Error("Formato de quiniela inválido");
    }

    // 2. OBTENER RESULTADOS OFICIALES (B2:B10)
    let reales = [];
    if (resSheet) {
      reales = resSheet.getRange(2, 2, TOTAL_PARTIDOS, 1).getValues().flat().map(r => r.toString().trim().toUpperCase());
    }

    // 3. PROCESAR COMBINACIONES
    const nuevasFilas = combinaciones.map(pronosticos => {
      let puntos = 0;
      pronosticos.forEach((pick, index) => {
        if (reales[index] && pick.toString().toUpperCase() === reales[index]) {
          puntos++;
        }
      });

      return [
        new Date(),   
        nombre,       
        "Jornada 10", 
        ...pronosticos, 
        puntos        
      ];
    });

    // 4. GUARDAR EN SHEETS
    if (nuevasFilas.length > 0) {
      sheet.getRange(sheet.getLastRow() + 1, 1, nuevasFilas.length, TOTAL_PARTIDOS + 4).setValues(nuevasFilas);
    }

    return ContentService.createTextOutput(JSON.stringify({"status": "ok", "procesadas": nuevasFilas.length}))
      .setMimeType(ContentService.MimeType.JSON);

  } catch (error) {
    sheet.appendRow([new Date(), "ERROR", error.toString()]);
    return ContentService.createTextOutput(JSON.stringify({"status": "error", "mensaje": error.toString()}))
      .setMimeType(ContentService.MimeType.JSON);
  }
}";

function abrirFacebook(){
  window.open("https://www.facebook.com/share/g/18kcwQzkPk/?mibextid=wwXIfr", "_blank");
}

const contenedor = document.getElementById("partidos");

for(let i=1;i<=9;i++){
  contenedor.innerHTML += `
    <div class="partido">
      <p>Partido ${i}</p>
      <div class="opciones">
        <button onclick="toggle(this)">L</button>
        <button onclick="toggle(this)">E</button>
        <button onclick="toggle(this)">V</button>
      </div>
    </div>
  `;
}

function toggle(btn){
  btn.classList.toggle("seleccionado");
}

function quinielaCompleta(){
  let ok = true;
  document.querySelectorAll(".opciones").forEach(op=>{
    if(op.querySelectorAll(".seleccionado").length === 0){
      ok = false;
    }
  });
  return ok;
}

function generarCombinaciones(){
  let partidos = [];

  document.querySelectorAll(".opciones").forEach(op=>{
    let sel = [...op.querySelectorAll(".seleccionado")].map(b=>b.innerText);
    partidos.push(sel);
  });

  let resultado = [[]];

  partidos.forEach(opciones=>{
    let temp = [];
    resultado.forEach(r=>{
      opciones.forEach(o=>{
        temp.push([...r, o]);
      });
    });
    resultado = temp;
  });

  return resultado;
}

function agregarQuiniela(){

  let combinaciones = generarCombinaciones();
  let lista = document.getElementById("lista");

  lista.innerHTML = "";

  combinaciones.forEach((c,i)=>{
    lista.innerHTML += `#${i+1} → ${c.join(" - ")}<br>`;
  });

  document.getElementById("total").value = combinaciones.length;
}

function limpiar(){
  location.reload();
}

function aleatorio(){
  document.querySelectorAll(".opciones").forEach(op=>{
    let botones = op.querySelectorAll("button");
    botones.forEach(b => b.classList.remove("seleccionado"));
    let rand = Math.floor(Math.random()*3);
    botones[rand].classList.add("seleccionado");
  });
}

function enviarWhats(){

  let nombre = document.getElementById("nombre").value.trim();
  let lista = document.getElementById("lista").innerText || "";
  let total = document.getElementById("total").value || 0;

  if(nombre === ""){
    alert("Debes ingresar el nombre antes de enviar");
    return;
  }

  if(lista === ""){
    alert("Primero debes agregar una quiniela");
    return;
  }

  let cantidad = parseInt(total) || 0;
  let pago = cantidad * 10;

  let mensaje = `📊 Quiniela Liga MX\n\n👤 Participante: ${nombre}\n\n📋 Selecciones:\n${lista}\n\n📊 Total: ${cantidad} quinielas\n💰 Total a pagar: $${pago} MXN`;

  let combinaciones = generarCombinaciones();

  fetch(URL_SCRIPT, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      nombre: nombre,
      quiniela: combinaciones
    })
  });

  // LIMPIAR TODO DESPUÉS DE ENVIAR
  document.querySelectorAll(".seleccionado").forEach(btn=>{
    btn.classList.remove("seleccionado");
  });

  document.getElementById("lista").innerHTML = "";
  document.getElementById("total").value = "";
  document.getElementById("nombre").value = "";

  let numero = "525610791509";
  window.open(`https://wa.me/${numero}?text=${encodeURIComponent(mensaje)}`);
}

</script>

</body>
</html>
