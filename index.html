<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quinielas Liga MX</title>

<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:white;
  margin:0;
  text-align:center;
}

.header{
  background:#1e293b;
  padding:15px;
}

h1{
  margin:0;
  color:#38bdf8;
}

.container{
  padding:20px;
  max-width:600px;
  margin:auto;
}

input, button{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:8px;
  border:none;
}

button{
  background:#38bdf8;
  color:black;
  font-weight:bold;
}

.partido{
  background:#1e293b;
  margin:10px 0;
  padding:10px;
  border-radius:10px;
}

.opciones button{
  width:30%;
  margin:2px;
}

.btn-facebook{
  display:inline-block;
  background:#1877f2;
  color:white;
  padding:12px;
  border-radius:8px;
  text-decoration:none;
  margin-top:10px;
}

.btn-whatsapp{
  background:#25D366;
  color:white;
}

</style>
</head>

<body>

<div class="header">
  <h1>Quinielas Liga MX</h1>
</div>

<div class="container">

<!-- Jornada -->
<input type="text" placeholder="Número de jornada">

<!-- Precio -->
<input type="text" placeholder="Precio de quiniela">

<!-- Cierre -->
<input type="text" placeholder="Horario de cierre">

<!-- Teléfono -->
<input type="text" placeholder="Teléfono de informes">

<!-- Facebook -->
<a href="https://www.facebook.com/share/g/18kcwQzkPk/?mibextid=wwXIfr" target="_blank" class="btn-facebook">
  Grupo de Facebook
</a>

<!-- Total quinielas -->
<input type="text" placeholder="Total de quinielas">

<!-- Nombre -->
<input type="text" placeholder="Nombre del participante">

<!-- Partidos -->
<div id="partidos"></div>

<!-- Botones -->
<button onclick="agregarQuiniela()">Agregar Quiniela</button>
<button onclick="limpiar()">Limpiar</button>
<button onclick="aleatorio()">Llenado Aleatorio</button>

<button class="btn-whatsapp" onclick="enviarWhats()">Enviar por WhatsApp</button>

</div>

<script>
// Crear 9 partidos
const contenedor = document.getElementById("partidos");

for(let i=1;i<=9;i++){
  contenedor.innerHTML += `
    <div class="partido">
      <p>Partido ${i}</p>
      <div class="opciones">
        <button onclick="seleccionar(this)">L</button>
        <button onclick="seleccionar(this)">E</button>
        <button onclick="seleccionar(this)">V</button>
      </div>
    </div>
  `;
}

// Selección
function seleccionar(btn){
  let botones = btn.parentElement.querySelectorAll("button");
  botones.forEach(b=>b.style.background="#38bdf8");
  btn.style.background="#22c55e";
}

// Limpiar
function limpiar(){
  location.reload();
}

// Aleatorio
function aleatorio(){
  document.querySelectorAll(".opciones").forEach(op=>{
    let botones = op.querySelectorAll("button");
    let rand = Math.floor(Math.random()*3);
    botones[rand].click();
  });
}

// WhatsApp
function enviarWhats(){
  let texto = "Mi quiniela:%0A";
  let i = 1;

  document.querySelectorAll(".partido").forEach(p=>{
    let sel = p.querySelector(".opciones button[style*='34,197,94']");
    if(sel){
      texto += "Partido "+i+": "+sel.innerText+"%0A";
    }
    i++;
  });

  window.open(`https://wa.me/?text=${texto}`);
}

// Placeholder (luego conectamos con Sheets)
function agregarQuiniela(){
  alert("Quiniela agregada (falta conectar a Sheets)");
}
</script>

</body>
</html>
