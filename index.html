<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiniela PRO</title>

<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:white;
  text-align:center;
  padding:20px;
}

.container{
  max-width:500px;
  margin:auto;
  background:#1e293b;
  padding:20px;
  border-radius:10px;
}

input, select, button{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:5px;
  border:none;
}

button{
  background:#22c55e;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  background:#16a34a;
}

h2{
  margin-bottom:10px;
}
</style>
</head>

<body>

<div class="container">

  <h2>🔥 Quiniela PRO</h2>

  <input type="text" id="nombre" placeholder="Tu nombre">

  <div id="partidos"></div>

  <button onclick="enviar()">Enviar Quiniela</button>

  <p id="msg"></p>

</div>

<script>
// 🔥 URL de tu Apps Script 
const API_URL = "https://script.google.com/macros/s/AKfycbz4e1jm5JnKpFvCvRjI4Ss1UDi42TlqtaE2lBUOwQxpVHf_rnGyAdKBNzCxQX6X616mTw/exec";

const partidosDiv = document.getElementById("partidos");

// crear 9 partidos
for(let i=1;i<=9;i++){
  partidosDiv.innerHTML += `
    <select id="p${i}">
      <option value="">Partido ${i}</option>
      <option value="1">Local</option>
      <option value="X">Empate</option>
      <option value="2">Visitante</option>
    </select>
  `;
}

async function enviar(){
  const nombre = document.getElementById("nombre").value;

  let quiniela = [];

  for(let i=1;i<=9;i++){
    quiniela.push(document.getElementById("p"+i).value);
  }

  const res = await fetch(API_URL, {
    method:"POST",
    body: JSON.stringify({
      nombre,
      quiniela
    })
  });

  const data = await res.json();

  document.getElementById("msg").innerText =
    data.status === "OK"
      ? "✔ Enviado. Puntos: " + data.puntos
      : "❌ Error: " + data.message;
}
</script>

</body>
</html>
