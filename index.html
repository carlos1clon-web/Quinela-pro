<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiniela Liga MX</title>

<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:white;
  margin:0;
  padding:20px;
  text-align:center;
}

.container{
  max-width:600px;
  margin:auto;
  background:#1e293b;
  padding:20px;
  border-radius:10px;
}

h2{
  margin-bottom:20px;
}

input{
  padding:10px;
  width:95%;
  margin-bottom:15px;
  border-radius:8px;
  border:none;
}

.partido{
  margin:12px 0;
  padding:12px;
  background:#334155;
  border-radius:8px;
  text-align:left;
}

.partido p{
  margin:0 0 8px 0;
  font-weight:bold;
}

label{
  margin-right:10px;
  cursor:pointer;
}

button{
  margin-top:20px;
  padding:12px;
  width:100%;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#22c55e;
  color:white;
  font-size:16px;
}

button:hover{
  background:#16a34a;
}
</style>
</head>

<body>

<div class="container">

<h2>Quiniela Liga MX</h2>

<input type="text" id="nombre" placeholder="Tu nombre">

<!-- PARTIDO 1 -->
<div class="partido">
  <p>Equipo 1 vs Equipo 2</p>
  <label><input type="radio" name="p1" value="Local"> Local</label>
  <label><input type="radio" name="p1" value="Empate"> Empate</label>
  <label><input type="radio" name="p1" value="Visitante"> Visitante</label>
</div>

<!-- PARTIDO 2 -->
<div class="partido">
  <p>Equipo 3 vs Equipo 4</p>
  <label><input type="radio" name="p2" value="Local"> Local</label>
  <label><input type="radio" name="p2" value="Empate"> Empate</label>
  <label><input type="radio" name="p2" value="Visitante"> Visitante</label>
</div>

<button onclick="enviarWhatsApp()">
Enviar por WhatsApp
</button>

</div>

<script>

const scriptURL = "https://script.google.com/macros/s/AKfycbxJ7ulso9mbznF9azzWBIOhwsnqlrNX9flSVcXvzkQZGXUGC_z78UiPyC1HzitA-Ct-OA/exec"; // 👈 pega aquí tu URL

function enviarWhatsApp(){

  const nombre = document.getElementById("nombre").value || "Sin nombre";

  let partidos = [];

  document.querySelectorAll(".partido").forEach((p, i) => {
    let seleccion = p.querySelector("input:checked")?.value || "Sin elegir";
    partidos.push(`Partido ${i+1}: ${seleccion}`);
  });

  const data = {
    nombre: nombre,
    quiniela: partidos.join(" | ")
  };

  // 1. GUARDAR EN SHEETS
  fetch(scriptURL, {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(() => {

    // 2. ABRIR WHATSAPP
    const mensaje =
`🎯 Quiniela Liga MX
👤 ${nombre}

` + partidos.join("\n");

    const url = `https://wa.me/?text=${encodeURIComponent(mensaje)}`;

    window.open(url, "_blank");

  })
  .catch(err => {
    alert("Error al guardar en Google Sheets");
    console.error(err);
  });

}

</script>

</body>
</html>
