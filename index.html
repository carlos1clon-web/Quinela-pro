<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiniela Liga MX</title>

<style>

body{
font-family: Arial;
background:#0f172a;
color:white;
text-align:center;
padding:20px;
}

h1{
color:#22c55e;
}

.container{
max-width:500px;
margin:auto;
background:#1e293b;
padding:20px;
border-radius:10px;
}

.info{
background:#334155;
padding:10px;
border-radius:6px;
margin-bottom:15px;
}

.partido{
margin:10px 0;
padding:10px;
background:#334155;
border-radius:6px;
}

.opciones{
display:flex;
justify-content:space-around;
margin-top:5px;
}

button{
margin-top:10px;
padding:12px;
width:100%;
background:#22c55e;
color:white;
border:none;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

.facebook{
margin-top:15px;
}

.facebook a{
color:#60a5fa;
text-decoration:none;
font-weight:bold;
}

input[type=text]{
width:100%;
padding:10px;
border-radius:5px;
border:none;
margin-bottom:10px;
}

</style>
</head>

<body>

<h1>⚽ Quiniela Liga MX</h1>

<div class="container">

<div class="info">
💰 Precio por quiniela: $20<br>
📅 Cierre: Viernes antes del primer partido<br>
📞 Informes: 5551234567
</div>

<form id="quinielaForm">

<input type="text" id="nombre" placeholder="Tu nombre" required>

<div id="partidos"></div>

<button type="button" onclick="aleatorio()">🎲 Aleatorio</button>

<button type="button" onclick="limpiar()">🧹 Limpiar</button>

<button type="submit">📨 Enviar Quiniela</button>

</form>

<div class="facebook">
<a href="https://www.facebook.com/share/g/16yT4cb2ZC/?mibextid=wwXIfr" target="_blank">
Ir al grupo de Facebook
</a>
</div>

</div>

<script>

const partidosDiv=document.getElementById("partidos");

for(let i=1;i<=9;i++){

partidosDiv.innerHTML+=`

<div class="partido">

<strong>Partido ${i}</strong>

<div class="opciones">

<label>
<input type="checkbox" name="p${i}" value="L"> L
</label>

<label>
<input type="checkbox" name="p${i}" value="E"> E
</label>

<label>
<input type="checkbox" name="p${i}" value="V"> V
</label>

</div>

</div>

`;

}

function limpiar(){
document.querySelectorAll("input[type=checkbox]").forEach(c=>c.checked=false);
}

function aleatorio(){

limpiar();

for(let i=1;i<=9;i++){

let opciones=["L","E","V"];
let r=Math.floor(Math.random()*3);

document.querySelectorAll(`input[name=p${i}]`)[r].checked=true;

}

}

const scriptURL="https://script.google.com/macros/s/AKfycbyi6aFWOTGxwt8y3lhjCa41ZdRQQmwD8OXxGS420uBBlRdk37Y2okA1nKnE5Z3noAM3/exec";

document.getElementById("quinielaForm").addEventListener("submit",function(e){

e.preventDefault();

let formData=new FormData();

formData.append("nombre",document.getElementById("nombre").value);

for(let i=1;i<=9;i++){

let valores=[];

document.querySelectorAll(`input[name=p${i}]:checked`).forEach(c=>{
valores.push(c.value);
});

formData.append("p"+i,valores.join("-"));

}

fetch(scriptURL,{
method:"POST",
body:formData
})
.then(()=>{
alert("Quiniela enviada correctamente ⚽");
document.getElementById("quinielaForm").reset();
})
.catch(()=>{
alert("Error al enviar la quiniela");
});

});

</script>

</body>
</html>
