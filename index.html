<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="format-detection" content="telephone=no">
<title>Quiniela Liga MX</title>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:20px;
}

.logo{
width:120px;
margin-bottom:10px;
cursor:pointer;
background:white;
padding:6px;
border-radius:8px;
}

.info{
background:#334155;
padding:10px;
border-radius:6px;
margin-bottom:10px;
}

.partido{
background:#334155;
margin:8px 0;
padding:10px;
border-radius:6px;
}

.opciones{
display:flex;
justify-content:space-around;
}

button{
margin-top:10px;
padding:12px;
width:100%;
background:#22c55e;
border:none;
color:white;
font-size:16px;
border-radius:6px;
}

.resultados{
margin-top:20px;
background:#020617;
padding:10px;
border-radius:6px;
}
</style>
</head>

<body>

<h1>Quiniela Liga MX</h1>
<h3>Jornada 1</h3>

<div class="info">
💰 Base $10 | Dobles x2 | Triples x3<br>
⏰ Cierre: Viernes 7:00 PM
</div>

<input type="text" id="nombre" placeholder="Nombre del participante" style="width:100%; padding:10px; margin-bottom:10px;">

<div id="partidos"></div>

<div class="info">
Dobles: <span id="dobles">0</span><br>
Triples: <span id="triples">0</span><br>
Total quiniela actual: $<span id="totalActual">10</span><br>
Total a pagar: $<span id="total">0</span>
</div>

<button onclick="aleatorio()">🎲 Aleatorio</button>
<button onclick="limpiar()">🧹 Limpiar</button>
<button onclick="agregar()">➕ Agregar Quiniela</button>
<button onclick="enviar()">📲 Enviar</button>

<div class="resultados">
<h3>Quinielas agregadas</h3>
<div id="lista"></div>
</div>

<script>

const BASE = 10;
let quinielas = [];
let totalGlobal = 0;

const partidosDiv=document.getElementById("partidos");

// Crear partidos
for(let i=1;i<=9;i++){
partidosDiv.innerHTML+=`
<div class="partido">
<strong>Partido ${i}</strong>
<div class="opciones">
<label><input type="checkbox" value="L" name="p${i}" onchange="calcular()"> L</label>
<label><input type="checkbox" value="E" name="p${i}" onchange="calcular()"> E</label>
<label><input type="checkbox" value="V" name="p${i}" onchange="calcular()"> V</label>
</div>
</div>
`;
}

// Calcular costo
function calcular(){
let dobles=0;
let triples=0;

for(let i=1;i<=9;i++){
let seleccion=document.querySelectorAll(`input[name=p${i}]:checked`).length;
if(seleccion==2) dobles++;
if(seleccion==3) triples++;
}

let total = BASE * Math.pow(2,dobles) * Math.pow(3,triples);

document.getElementById("dobles").innerText=dobles;
document.getElementById("triples").innerText=triples;
document.getElementById("totalActual").innerText=total;
}

// Limpiar
function limpiar(){
document.querySelectorAll("input[type=checkbox]").forEach(c=>c.checked=false);
calcular();
}

// Aleatorio
function aleatorio(){
limpiar();
for(let i=1;i<=9;i++){
let r=Math.floor(Math.random()*3);
document.querySelectorAll(`input[name=p${i}]`)[r].checked=true;
}
calcular();
}

// Agregar quiniela
function agregar(){

let nombre=document.getElementById("nombre").value.trim();
if(nombre===""){
alert("Debes ingresar tu nombre");
return;
}

let partidos=[];

for(let i=1;i<=9;i++){
let picks=[];
document.querySelectorAll(`input[name=p${i}]:checked`).forEach(c=>{
picks.push(c.value);
});

if(picks.length===0){
alert("Debes llenar todos los partidos");
return;
}

partidos.push(picks);
}

function generar(arr, index=0){
if(index===arr.length) return [[]];
let resultado=[];
let resto = generar(arr, index+1);

arr[index].forEach(op=>{
resto.forEach(r=>{
resultado.push([op, ...r]);
});
});

return resultado;
}

let combinaciones = generar(partidos);

combinaciones.forEach(combo=>{
quinielas.push(combo);
document.getElementById("lista").innerHTML+=`
<div>Quiniela ${quinielas.length}: ${combo.join(" ")}</div>
`;
});

totalGlobal += combinaciones.length * BASE;
document.getElementById("total").innerText = totalGlobal;

alert("Se generaron " + combinaciones.length + " quinielas");

limpiar();
}

// Enviar
function enviar(){

let nombre = document.getElementById("nombre").value.trim();

if(nombre === "" || quinielas.length === 0){
alert("Falta nombre o quinielas");
return;
}

let datos = {
  nombre: nombre,
  quinielas: quinielas,
  total: totalGlobal,
  fecha: new Date().toLocaleString()
};

// 🔥 ENVÍO
fetch("https://script.google.com/macros/s/AKfycbyJ9_6Oy-81YDVDmjvhsNVzTPaxZxLQc25dAMe7F4tpuPRMt7L-LXEol_Pc_OnSIMA4_w/exec", {
  method: "POST",
  body: JSON.stringify(datos),
  headers: {
    "Content-Type": "application/json"
  }
})
.then(res => res.text())
.then(res => {

  if(res.includes("ok")){
    alert("✅ Quinielas guardadas correctamente");

    // WhatsApp SOLO si guardó bien
    let mensaje="*Quiniela Liga MX*%0A";
    mensaje+="Nombre: "+nombre+"%0A%0A";

    quinielas.forEach((q,i)=>{
      mensaje+="Quiniela "+(i+1)+": "+q.join(" ")+"%0A";
    });

    mensaje+="%0ATotal: $"+totalGlobal;

    window.open("https://wa.me/525610791509?text="+mensaje,"_blank");

    // Reset
    quinielas=[];
    totalGlobal=0;
    document.getElementById("lista").innerHTML="";
    document.getElementById("total").innerText="0";

  } else {
    alert("❌ Error al guardar: " + res);
  }

})
.catch(err => {
  alert("❌ Error de conexión");
  console.log(err);
});

}

</script>

</body>
</html>
