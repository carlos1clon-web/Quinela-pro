<script>

/* === CONFIGURACIÓN === /
const scriptURL = "https://script.google.com/macros/s/AKfycbyi6aFWOTGxwt8y3lhjCa41ZdRQQmwD8OXxGS420uBBlRdk37Y2okA1nKnE5Z3noAM3/exec";

/ === FUNCIÓN QUE RECOLECTA LA QUINIELA Y LA GUARDA === /
function guardarQuinielaEnSheet(){

  try{

    let formData = new FormData();

    // nombre del participante
    const nombre = document.getElementById("nombre") ? document.getElementById("nombre").value : "";
    formData.append("nombre", nombre);

    // partidos (p1 a p9)
    for(let i=1;i<=9;i++){
      const el = document.getElementById("p"+i);
      if(el){
        formData.append("p"+i, el.value);
      }
    }

    fetch(scriptURL,{
      method:"POST",
      body:formData
    })
    .then(()=>console.log("Quiniela guardada en Google Sheets"))
    .catch(()=>console.log("Error al guardar la quiniela"));

  }catch(err){
    console.log("Error:",err);
  }

}

/ === INTERCEPTA EL ENVÍO DEL FORMULARIO SIN ROMPER TU DISEÑO === */
document.addEventListener("DOMContentLoaded", function(){

  const form = document.getElementById("quinielaForm");

  if(form){
    form.addEventListener("submit", function(){

      // guarda la quiniela sin afectar lo demás (WhatsApp, etc.)
      guardarQuinielaEnSheet();

    });
  }

});

</script>
