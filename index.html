<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiniela Liga MX</title>

<style>

body{
font-family: Arial;
background:#0f172a;
color:white;
text-align:center;
padding:20px;
}

h1{
color:#22c55e;
}

.container{
max-width:600px;
margin:auto;
background:#1e293b;
padding:20px;
border-radius:10px;
}

.info{
background:#334155;
padding:10px;
border-radius:6px;
margin-bottom:15px;
}

.quiniela{
margin-bottom:20px;
padding:10px;
background:#020617;
border-radius:8px;
border:2px solid #22c55e;
}

.partido{
margin:10px 0;
padding:10px;
background:#334155;
border-radius:6px;
}

.opciones{
display:flex;
justify-content:space-around;
margin-top:5px;
}

button{
margin-top:10px;
padding:14px;
width:100%;
background:#22c55e;
color:white;
border:none;
font-size:18px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

.agregar{
background:#3b82f6;
font-size:20px;
font-weight:bold;
}

.agregar:hover{
background:#2563eb;
}

.facebook{
margin-top:20px;
}

.facebook a{
color:#60a5fa;
text-decoration:none;
font-weight:bold;
}

input[type=text]{
width:100%;
padding:10px;
border-radius:5px;
border:none;
margin-bottom:10px;
}

</style>
</head>

<body>

<h1>⚽ Quiniela Liga MX</h1>

<div class="container">

<div class="info">
💰 Precio por quiniela: $20<br>
📅 Cierre: Viernes antes del primer partido<br>
📞 Informes: 5551234567
</div>

<input type="text" id="nombre" placeholder="Tu nombre">

<button class="agregar" onclick="agregarQuiniela()">➕ AGREGAR QUINIELA</button>

<div id="quinielas"></div>

<button onclick="aleatorio()">🎲 Aleatorio</button>

<button onclick="limpiar()">🧹 Limpiar</button>

<button onclick="enviar()">📨 Enviar Quinielas</button>

<div class="facebook">
<a href="https://www.facebook.com/share/g/16yT4cb2ZC/?mibextid=wwXIfr" target="_blank">
Ir al grupo de Facebook
</a>
</div>

</div>

<script>

let totalQuinielas=0;

function crearPartidos(id){

let html="";

for(let i=1;i<=9;i++){

html+=`
<div class="partido">
<strong>Partido ${i}</strong>

<div class="opciones">
<label><input type="checkbox" name="q${id}p${i}" value="L"> L</label>
<label><input type="checkbox" name="q${id}p${i}" value="E"> E</label>
<label><input type="checkbox" name="q${id}p${i}" value="V"> V</label>
</div>

</div>
`;

}

return html;

}

function agregarQuiniela(){

totalQuinielas++;

let div=document.createElement("div");

div.className="quiniela";

div.innerHTML="<h3>Quiniela "+totalQuinielas+"</h3>"+crearPartidos(totalQuinielas);

document.getElementById("quinielas").appendChild(div);

}

function limpiar(){
document.querySelectorAll("input[type=checkbox]").forEach(c=>c.checked=false);
}

function aleatorio(){

document.querySelectorAll(".quiniela").forEach((q,index)=>{

for(let i=1;i<=9;i++){

let opciones=q.querySelectorAll(`input[name=q${index+1}p${i}]`);

let r=Math.floor(Math.random()*3);

opciones[r].checked=true;

}

});

}

const scriptURL="https://script.google.com/macros/s/AKfycbyi6aFWOTGxwt8y3lhjCa41ZdRQQmwD8OXxGS420uBBlRdk37Y2okA1nKnE5Z3noAM3/exec";

function enviar(){

let nombre=document.getElementById("nombre").value;

document.querySelectorAll(".quiniela").forEach((q,index)=>{

let formData=new FormData();

formData.append("nombre",nombre+" #"+(index+1));

for(let i=1;i<=9;i++){

let valores=[];

q.querySelectorAll(`input[name=q${index+1}p${i}]:checked`).forEach(c=>{
valores.push(c.value);
});

formData.append("p"+i,valores.join("-"));

}

fetch(scriptURL,{
method:"POST",
body:formData
});

});

alert("Quinielas enviadas correctamente ⚽");

}

agregarQuiniela();

</script>

</body>
</html>
